<div class="apply-container">
    <h2>{{ 'APPLY_TITLE' | translate }}</h2>

    <div class="jobs-list">
        <div class="job-card glass-effect" *ngFor="let job of jobs">
            <div class="job-info">
                <h3>{{ job.title }}</h3>
                <p class="company">{{ job.company }}</p>
                <p class="location">📍 {{ job.location }}</p>
            </div>
            <button class="btn-apply" (click)="openApplyForm(job)">Apply Now</button>
        </div>
    </div>

    <!-- Application Modal -->
    <div class="modal-overlay" *ngIf="selectedJob">
        <div class="modal-content glass-effect">
            <h3>Apply for {{ selectedJob.title }}</h3>
            <p>at {{ selectedJob.company }}</p>

            <div class="form-group">
                <label>Name</label>
                <input [(ngModel)]="applicantData.name" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input [(ngModel)]="applicantData.email" placeholder="Your Email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input [(ngModel)]="applicantData.phone" placeholder="Your Phone">
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" (click)="closeApplyForm()">Cancel</button>
                <button class="btn-submit" (click)="submitApplication()">Submit Application</button>
            </div>
        </div>
    </div>
</div>
